<div class="profile-container" *ngIf="!isLoading && user">
  <div class="page-header">
    <h1>{{ 'profile.title' | translate }}</h1>
  </div>

  <div class="profile-card">
    <div class="profile-info-section">
      <div class="profile-details">
        <div class="profile-item">
          <label class="label">{{ 'profile.firstName' | translate }}:</label>
          <span class="value">{{ editableProfile.firstName }}</span>
        </div>
        <div class="profile-item">
          <label class="label">{{ 'profile.lastName' | translate }}:</label>
          <span class="value">{{ editableProfile.lastName }}</span>
        </div>
        <div class="profile-item">
          <label class="label">{{ 'profile.email' | translate }}:</label>
          <span class="value">{{ editableProfile.email }}</span>
        </div>
        <div class="profile-item">
          <label class="label">{{ 'profile.address' | translate }}:</label>
          <span class="value">{{ editableProfile.address }}</span>
        </div>
        <div class="profile-item">
          <label class="label">{{ 'profile.phoneNumber' | translate }}:</label>
          <span class="value">{{ editableProfile.phoneNumber }}</span>
        </div>
      </div>
    </div>

    <div class="profile-photo-section">
      <ng-container *ngIf="profilePhotoUrl; else initialsAvatar">
        <img [src]="profilePhotoUrl" alt="Profile Photo" class="profile-photo" (error)="onImageError()" />
      </ng-container>
      <ng-template #initialsAvatar>
        <div class="profile-avatar-initials">{{ getInitials() }}</div>
      </ng-template>

      <div class="photo-actions">
        <button class="change-photo-btn" type="button" (click)="changePhoto()">
          {{ 'profile.changePhotoButton' | translate }}
        </button>
        <button class="remove-photo-btn" type="button" (click)="removePhoto()" *ngIf="profilePhotoUrl">
          {{ 'profile.removePhotoButton' | translate }}
        </button>
      </div>

      <div class="photo-error" *ngIf="photoError">
        {{ photoError }}
      </div>
    </div>
  </div>
</div>

<div class="profile-empty" *ngIf="isLoading">
  <p>{{ 'profile.loading' | translate }}</p>
</div>

<div class="profile-empty" *ngIf="!isLoading && !user">
  <p>{{ 'profile.noUser' | translate }}</p>
</div>

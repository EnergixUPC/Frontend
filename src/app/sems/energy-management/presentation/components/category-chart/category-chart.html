<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>{{ categoryConsumptionLabel }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="chart-container" *ngIf="hasChartData(); else noData">
      <canvas baseChart
              [data]="doughnutChartData"
              [options]="doughnutChartOptions"
              [type]="doughnutChartType">
      </canvas>
    </div>

    <ng-template #noData>
      <div class="no-data">
        <mat-icon>device_hub</mat-icon>
        <p>{{ 'dashboard.charts.noConsumptionData' | translate }}</p>
      </div>
    </ng-template>
  </mat-card-content>
</mat-card>

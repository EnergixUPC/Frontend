<div class="plans-container">
  <div class="page-header">
    <h1>{{ 'plans.title' | translate }}</h1>
    <p class="subtitle">{{ 'plans.subtitle' | translate }}</p>
  </div>

  <div class="plans-grid">
    <div class="plan-card" *ngFor="let plan of plans" [class.featured]="plan.featured">
      <div class="plan-badge" *ngIf="plan.badgeKey">
        {{ plan.badgeKey | translate }}
      </div>

      <div class="plan-body">
        <div class="plan-header">
          <h2>{{ plan.titleKey | translate }}</h2>
          <p>{{ plan.taglineKey | translate }}</p>
        </div>

        <div class="plan-price">
          <span class="price">{{ plan.priceKey | translate }}</span>
          <span class="period">{{ plan.periodKey | translate }}</span>
        </div>

        <ul class="plan-features">
          <li *ngFor="let featureKey of plan.featureKeys">
            <mat-icon class="feature-icon">check</mat-icon>
            <span>{{ featureKey | translate }}</span>
          </li>
        </ul>
      </div>

      <button
        class="plan-cta"
        type="button"
        [class.is-current]="plan.type === currentPlan && currentPlan === 'basic'"
        [class.is-cancel]="plan.type === currentPlan && currentPlan !== 'basic'"
        [disabled]="plan.type === currentPlan && currentPlan === 'basic'"
        (click)="plan.type === currentPlan && currentPlan !== 'basic' ? onCancelPlan() : onSubscribe(plan)">
        {{ (plan.type === currentPlan ? (currentPlan === 'basic' ? 'plans.currentPlan' : 'plans.cancelPlan') : 'plans.cta') | translate }}
      </button>
    </div>
  </div>
</div>

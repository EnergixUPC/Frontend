name: Tests

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Jest (domain & application)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm run test:jest

  component-tests:
    name: Karma (components)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Karma tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI

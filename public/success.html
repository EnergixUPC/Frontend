<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Success Redirect</title>
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  <p>Redirecting to payment success...</p>

  <script>
    (function() {
      try {
        var params = new URLSearchParams(window.location.search || '');
        var sessionId = params.get('session_id') || params.get('sessionId') || params.get('id');
        var target = '/payment-success';

        if (sessionId) {
          // Use replace so back button doesn't keep the intermediate page
          window.location.replace(window.location.origin + target + '?session_id=' + encodeURIComponent(sessionId));
        } else {
          window.location.replace(window.location.origin + target);
        }
      } catch (e) {
        // If JS failed, log and allow fallback below
        try { console.error('Redirect error:', e); } catch(err) {}
      }
    })();
  </script>

  <!-- Fallback for browsers with JS disabled or when script is not executed by the server -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=/payment-success">
    <p>If you are not redirected automatically, <a href="/payment-success">click here</a>.</p>
  </noscript>

  <!-- Visible fallback link (in case script is rendered as text) -->
  <p>If you are not redirected automatically, <a id="fallback-link" href="/payment-success">go to payment success</a>.</p>

  <script>
    // Try to hide the visible fallback link immediately if JS runs normally
    (function(){
      try {
        var link = document.getElementById('fallback-link');
        if(link && link.style) link.style.display = 'none';
      } catch(e) {}
    })();
  </script>
</body>
</html>
